name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/mgcil/**'
      - '.github/workflows/deploy-frontend.yml'
  # Permet aussi de lancer le déploiement manuellement depuis l'onglet Actions
  workflow_dispatch:

# Permissions requises pour publier sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mgcil
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/mgcil/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (production)
        # base-href = / car le site est servi sur le domaine custom https://mgcil.xyz/
        run: npm run build -- --configuration production --base-href /

      - name: Add SPA 404 fallback, .nojekyll and CNAME
        # 404.html = copie de index.html pour que le routing Angular fonctionne au rechargement d'une route
        # CNAME = domaine custom, sinon GitHub Pages le réinitialise à chaque déploiement
        run: |
          cp dist/mgcil/browser/index.html dist/mgcil/browser/404.html
          touch dist/mgcil/browser/.nojekyll
          echo 'mgcil.xyz' > dist/mgcil/browser/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/mgcil/dist/mgcil/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
